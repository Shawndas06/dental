<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ title }}{% endblock %} | Dental Admin</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #fff;
      --text: #1a1f2e;
      --muted: #5c6578;
      --line: #dde3ea;
      --accent: #0d9488;
      --accent-dark: #0f766e;
      --danger: #dc2626;
      --ok: #059669;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    a { color: var(--accent-dark); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px;
      background: #111827;
      color: #e5e7eb;
      padding: 24px 16px;
      flex-shrink: 0;
    }
    .sidebar h1 {
      font-size: 1rem;
      margin: 0 0 24px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .sidebar nav a {
      display: block;
      color: #d1d5db;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 4px;
    }
    .sidebar nav a:hover, .sidebar nav a.active {
      background: rgba(255,255,255,0.08);
      color: #fff;
      text-decoration: none;
    }
    .sidebar .logout { margin-top: 32px; font-size: 0.9rem; }
    .content { flex: 1; padding: 32px; max-width: 1200px; }
    .page-title { margin: 0 0 24px; font-size: 1.75rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }
    .stat {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
    }
    .stat-label { color: var(--muted); font-size: 0.85rem; }
    .stat-value { font-size: 1.75rem; font-weight: 700; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: var(--accent-dark); text-decoration: none; color: #fff; }
    .btn-secondary { background: #374151; }
    .btn-danger { background: var(--danger); }
    .badge-ok { color: var(--ok); font-weight: 600; }
    .badge-fail { color: var(--danger); font-weight: 600; }
    .muted { color: var(--muted); }
    pre {
      background: #111827;
      color: #e5e7eb;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.85rem;
    }
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card { width: 100%; max-width: 400px; }
    label { display: block; margin-bottom: 6px; font-weight: 500; }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 1rem;
    }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
  </style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
