app = 'dental-mvp-docs'
primary_region = 'ams'

[build]
  dockerfile = "../../Dockerfile.docs"
  build-context = "../.."

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[processes]
  app = 'mkdocs serve -a 0.0.0.0:8080 -f /app/mkdocs.yml'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
