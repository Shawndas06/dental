app = 'dental-mvp-nats'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'nats_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 4222
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 4222

[[services]]
  protocol = 'tcp'
  internal_port = 8222

  [[services.ports]]
    port = 8222

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
