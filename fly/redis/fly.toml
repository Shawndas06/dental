app = 'dental-mvp-redis'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'redis_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 6379
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 6379

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
