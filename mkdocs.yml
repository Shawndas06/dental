site_name: Dental Telegram Bot
site_description: Документация гибридного Telegram-бота стоматологической клиники

dev_addr: 127.0.0.1:8008

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search:
      lang: ru

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Главная: index.md
  - Быстрый старт: getting-started.md
  - Эксплуатация:
      - Админ-панель: admin.md
      - Демо-сценарий: demo.md
      - Специфика клиники: clinic-spec.md
  - Архитектура: architecture.md
  - Сценарии пользователя: user-flows.md
  - Сервисы:
      - Bot Gateway: services/bot-gateway.md
      - Core API: services/core-api.md
      - AI Orchestrator: services/ai-orchestrator.md
      - Worker: services/worker.md
      - CRM Mock: services/crm-mock.md
  - API:
      - Обзор: api/overview.md
      - Callback-кнопки: api/callbacks.md
      - События NATS: api/events.md
  - Конфигурация: configuration.md
  - Безопасность: security.md
  - Тестирование: testing.md
  - Деплой: deployment.md
  - MkDocs: mkdocs.md

extra:
  social: []
